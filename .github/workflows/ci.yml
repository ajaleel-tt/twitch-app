name: CI

on:
  push:
    branches: [master]
    paths:
      - '**.scala'
      - '**.sbt'
      - 'project/**'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/**'
      - 'e2e/**'
  pull_request:
    branches: [master]
    paths:
      - '**.scala'
      - '**.sbt'
      - 'project/**'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/**'
      - 'e2e/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install sbt
        run: |
          echo "deb https://repo.scala-sbt.org/scalasbt/debian all main" | sudo tee /etc/apt/sources.list.d/sbt.list
          curl -sL "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x2EE0EA64E40A89B84B2DF73499E82A75642AC823" | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/sbt.gpg
          sudo apt-get update
          sudo apt-get install -y sbt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm install

      - name: Cache sbt
        uses: actions/cache@v4
        with:
          path: |
            ~/.sbt
            ~/.cache/coursier
          key: ${{ runner.os }}-sbt-${{ hashFiles('build.sbt', 'project/plugins.sbt', 'project/build.properties') }}
          restore-keys: |
            ${{ runner.os }}-sbt-

      - name: Build project
        run: sbt compile

      - name: Build production JS
        run: sbt frontend/fullLinkJS

      - name: Run tests
        run: sbt test

  docker-build-and-e2e:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: twitch-app:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start app container
        run: |
          docker run -d --name app -p 8080:8080 \
            -e TWITCH_CLIENT_ID=fake \
            -e TWITCH_CLIENT_SECRET=fake \
            twitch-app:test
          for i in $(seq 1 30); do
            if curl -s http://localhost:8080 > /dev/null 2>&1; then
              echo "Server is ready"
              break
            fi
            echo "Waiting for server... ($i)"
            sleep 2
          done

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm init -y --prefix e2e
          npm install --prefix e2e @playwright/test
          npx --prefix e2e playwright install --with-deps chromium

      - name: Run smoke test
        run: npx --prefix e2e playwright test --config e2e/playwright.config.ts

      - name: Container logs
        if: always()
        run: docker logs app 2>&1 || true
