<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Get notified when your favorite Twitch categories go live">
    <meta name="theme-color" content="#9146ff">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Twitch Category Tracker</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg">
    <link rel="apple-touch-icon" href="/icons/icon.svg">
    <link href="dist/output.css?v=2" rel="stylesheet">
</head>
<body>
    <div id="app"></div>
    <!-- This path assumes fastLinkJS output in development -->
    <script src="target/scala-3.6.3/frontend-fastopt/main.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js')
          .then((reg) => console.log('SW registered, scope:', reg.scope))
          .catch((err) => console.warn('SW registration failed:', err));
      }
    </script>
</body>
</html>
